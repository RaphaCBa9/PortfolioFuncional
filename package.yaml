name:                carteira
version:             0.1.0.0
synopsis:            Otimização de carteiras Dow Jones via simulação massiva paralela
license:             BSD-3-Clause
author:              Raphael Banov
maintainer:          raphaba9@gmail.com
copyright:           2026 Raphael Banov
category:            Finance
extra-source-files:
- README.md
- CHANGELOG.md

dependencies:
- base >= 4.7 && < 5
- vector
- primitive
- mwc-random
- parallel
- deepseq
- http-conduit
- http-client-tls
- cassava
- bytestring
- text
- time
- containers

ghc-options:
- -Wall
- -Wcompat

executables:
  carteira:
    source-dirs: src
    main:        Main.hs
    ghc-options:
    - -threaded
    - -rtsopts
    - "-with-rtsopts=-N"
    - -O2
    dependencies:
    - base
    - vector
    - primitive
    - mwc-random
    - parallel
    - deepseq
    - http-conduit
    - http-client-tls
    - cassava
    - bytestring
    - text
    - time
    - containers
